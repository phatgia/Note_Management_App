version: '3.8'

services:
  # 1. Container chạy PHP/Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    volumes:
      - ./:/var/www
    networks:
      - laravel_network

  # 2. Container Nginx làm Web Server
  web:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8000:80" # Bạn sẽ truy cập web qua http://localhost:8000
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_network

  # 3. Container MySQL Database
  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: note_management
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    networks:
      - laravel_network

  # 4. Container Node.js chạy Vite (React)
  node:
    image: node:18-alpine
    container_name: laravel_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173" # Cổng mặc định của Vite
    # Tự động cài npm và chạy lệnh dev
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - laravel_network

networks:
  laravel_network:
    driver: bridge