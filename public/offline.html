<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang ngoại tuyến - Note App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            padding: 3rem 2.5rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .icon-wrap {
            width: 80px; height: 80px;
            background: #fff7ed;
            border: 2px solid #fed7aa;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .icon-wrap svg { width: 40px; height: 40px; color: #ea580c; }
        h1 { font-size: 1.5rem; font-weight: 800; color: #1f2937; margin-bottom: .5rem; }
        p { font-size: .95rem; color: #6b7280; line-height: 1.6; margin-bottom: 2rem; }
        .btn {
            display: inline-flex; align-items: center; gap: .5rem;
            background: #ea580c; color: white;
            font-weight: 700; font-size: .9rem;
            padding: .75rem 1.75rem; border-radius: 12px; border: none;
            cursor: pointer; transition: background .2s, transform .1s;
            text-decoration: none;
        }
        .btn:hover { background: #c2410c; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .status {
            display: flex; align-items: center; gap: .5rem; justify-content: center;
            margin-top: 1.5rem; font-size: .8rem; color: #9ca3af;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #ef4444; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; } 50% { opacity: .4; }
        }
        .tip {
            margin-top: 1.5rem; padding: 1rem;
            background: #f9fafb; border-radius: 12px; border: 1px solid #f3f4f6;
            font-size: .82rem; color: #6b7280; text-align: left;
        }
        .tip strong { display: block; color: #374151; margin-bottom: .25rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M8.111 8.111A3 3 0 0012 15a3 3 0 003.889-3.889M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <h1>Bạn đang ngoại tuyến</h1>
        <p>Không có kết nối internet. Vui lòng kiểm tra lại mạng và thử lại.</p>
        <button class="btn" onclick="window.location.reload()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:16px;height:16px">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
            Thử lại
        </button>
        <div class="status">
            <div class="dot"></div>
            <span id="status-text">Đang ngoại tuyến...</span>
        </div>
        <div class="tip">
            <strong>💡 Mẹo:</strong>
            Nếu bạn đã từng truy cập ứng dụng trước đó, hãy quay lại trang chủ để xem các ghi chú đã được lưu sẵn trên thiết bị.
            <a href="/home" style="display:block;margin-top:.5rem;color:#ea580c;font-weight:700;">→ Về trang chủ</a>
        </div>
    </div>
    <script>
        window.addEventListener('online', () => {
            document.getElementById('status-text').textContent = 'Đã kết nối lại! Đang tải lại...';
            document.querySelector('.dot').style.background = '#22c55e';
            setTimeout(() => window.location.href = '/home', 800);
        });
    </script>
</body>
</html>
